<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="sk" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="23" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.6"/>
    </filter>
  </defs>
  <g filter="url(#sk)" stroke="#333e4d" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Nucleus -->
    <circle cx="32" cy="32" r="5" fill="#333e4d" stroke="none"/>
    <!-- Orbit 1 — horizontal -->
    <ellipse cx="32" cy="32" rx="28" ry="10"/>
    <!-- Orbit 2 — rotated 60° -->
    <ellipse cx="32" cy="32" rx="28" ry="10" transform="rotate(60 32 32)"/>
    <!-- Orbit 3 — rotated 120° -->
    <ellipse cx="32" cy="32" rx="28" ry="10" transform="rotate(120 32 32)"/>
  </g>
</svg>
